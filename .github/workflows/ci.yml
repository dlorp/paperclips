name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Check commit attribution
        run: |
          echo "=== HDLS Attribution Check ==="
          BLOCKED=0
          AGENT_NAMES="hyph4 pr0b3 3tch s3ntry dr3dg3 g0blin 0r4cl3 r3nd3r spl1c3 lorpBot lorpbot"
          DISCLOSURE_PATTERNS=(
            "hdls agent" "hdls pipeline" "agent pipeline" "multi-agent"
            "agent workflow" "llm agent" "claude code" "ai-generated" "ai assisted"
          )

          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD 2>/dev/null || git rev-parse origin/${{ github.base_ref }})
          for sha in $(git rev-list "$BASE_SHA"..HEAD); do
            MSG=$(git log --format='%B' -1 "$sha")
            AUTHOR=$(git log --format='%an <%ae>' -1 "$sha")

            for name in $AGENT_NAMES; do
              if echo "$MSG" | grep -iq "\b${name}\b"; then
                echo "::error commit=$sha::Agent name '$name' found in commit message"
                BLOCKED=$((BLOCKED + 1))
              fi
            done

            for pattern in "${DISCLOSURE_PATTERNS[@]}"; do
              if echo "$MSG" | grep -iq "$pattern"; then
                echo "::error commit=$sha::Disclosure pattern '$pattern' in commit message"
                BLOCKED=$((BLOCKED + 1))
              fi
            done

            if echo "$AUTHOR" | grep -qv 'dlorp'; then
              if echo "$AUTHOR" | grep -qviE 'dependabot|github-actions|renovate'; then
                echo "::warning commit=$sha::Non-dlorp author: $AUTHOR"
              fi
            fi
          done

          if [ "$BLOCKED" -gt 0 ]; then
            echo "::error::$BLOCKED attribution violations found"
            exit 1
          fi
          echo "✓ All commits pass attribution check"
